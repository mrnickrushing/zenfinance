# Railway service config for the ZenFinance API + site.
# Place a copy at the repo root (or set Config Path to infra/railway.toml
# in the Railway service settings).

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build && npm run db:migrate -w @zenfinance/api"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
