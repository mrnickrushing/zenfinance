# Railway service config for the ZenFinance API + site.
# Place a copy at the repo root (or set Config Path to infra/railway.toml
# in the Railway service settings).

[build]
builder = "nixpacks"
buildCommand = "npm ci --workspace=@zenfinance/api --workspace=@zenfinance/shared --include-workspace-root && npm run build"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/ready"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
