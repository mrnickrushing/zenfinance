name: CI

on:
  push:
    # release/** and release-* are included so the security-scan job's triaged
    # gate (which keys off github.ref) actually runs on release-branch pushes —
    # the push trigger is evaluated before any job/env expression.
    branches: [main, 'release/**', 'release-*']
  pull_request:

# Every job only needs to read the checked-out repository. Keep the token
# read-only even if the repository's organization default is more permissive.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: zenfinance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d zenfinance_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run build:site
      - run: npm test
        env:
          DATABASE_URL: postgres://dev:dev@localhost:5432/zenfinance_test

  security-scan:
    # PLAN §7: run the agents toolkit's static analysis on every PR (free
    # heuristic pass) and on release branches with LLM triage (API key from
    # secrets). The scan CLI always exits 0; gate_security_scan.py turns its
    # JSON report into the pass/fail decision.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
      - name: Install agents toolkit
        # Pin the reviewed toolkit revision so an upstream branch update cannot
        # execute arbitrary new code in this repository's CI context.
        run: pip install "git+https://github.com/mrnickrushing/agents.git@56d5364c5b00749da71db9fe907a53d147703836"
      - name: Run scan
        # ANTHROPIC_API_KEY is only set for pushes to main/release branches, so
        # PRs get the heuristic-only pass and release branches get LLM triage.
        # The CLI auto-enables triage when the key is present.
        env:
          ANTHROPIC_API_KEY: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release'))) && secrets.ANTHROPIC_API_KEY || '' }}
        run: python -m agents.cli scan --path . --out scan-report.json
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: security-scan-report
          path: scan-report.json
          if-no-files-found: warn
      - name: Gate on confirmed high and critical findings
        run: python .github/scripts/gate_security_scan.py scan-report.json --fail-on HIGH
